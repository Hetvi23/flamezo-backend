name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'flamezo_backend/**'
      - 'frontend/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/DEPLOYMENT_STATUS.txt'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

jobs:
  deploy:
    name: Deploy to Production Server (backend.flamezo.in)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SITE_CONFIG_JSON: ${{ secrets.SITE_CONFIG_JSON }}
        run: |
          # The "Gold Standard" way: Pipe the JSON into SSH to avoid all escaping issues
          echo "$SITE_CONFIG_JSON" | ssh -o StrictHostKeyChecking=no $SSH_USER@$SERVER_HOST \
            "export SITE_CONFIG_JSON=\$(cat); \
             cd /home/frappe/frappe-bench && \
             if [ -f apps/flamezo_backend/scripts/deploy.sh ]; then \
               bash apps/flamezo_backend/scripts/deploy.sh $BRANCH backend.flamezo.in; \
             else \
               echo 'New script not found at apps/flamezo_backend/scripts/deploy.sh, falling back to ./deploy.sh for migration...'; \
               bash ./deploy.sh $BRANCH; \
             fi"

      - name: Verify scheduler is active
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          SCHEDULER_STATUS=$(ssh -o StrictHostKeyChecking=no $SSH_USER@$SERVER_HOST \
            "cd /home/frappe/frappe-bench && bench --site backend.flamezo.in scheduler status")

          echo "Scheduler status: $SCHEDULER_STATUS"
          if echo "$SCHEDULER_STATUS" | grep -q "disabled"; then
            echo "ERROR: Scheduler is still disabled after deployment!"
            exit 1
          fi

      - name: Verify web services
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SERVER_HOST \
            "supervisorctl status frappe-bench-web:* frappe-bench-workers:* || true"
