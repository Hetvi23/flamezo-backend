name: Deploy to Staging (Dev)

on:
  push:
    branches:
      - develop
    paths:
      - 'flamezo_backend/**'
      - 'frontend/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/deploy_dev.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'develop'

jobs:
  deploy:
    name: Deploy to Staging Server (dev.flamezo.in)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 2222 -H ${{ secrets.DEV_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
          SERVER_HOST: ${{ secrets.DEV_SERVER_HOST }}
          SSH_USER: ${{ secrets.DEV_SSH_USER }}
          SITE_CONFIG_JSON: ${{ secrets.DEV_SITE_CONFIG_JSON }}
        run: |
          echo "$SITE_CONFIG_JSON" | ssh -o StrictHostKeyChecking=no -p 2222 $SSH_USER@$SERVER_HOST \
            "export SITE_CONFIG_JSON=\$(cat); \
             cd /home/frappe/frappe-bench && \
             bash apps/flamezo_backend/scripts/deploy.sh $BRANCH dev.flamezo.in"

      - name: Verify scheduler is active
        env:
          SERVER_HOST: ${{ secrets.DEV_SERVER_HOST }}
          SSH_USER: ${{ secrets.DEV_SSH_USER }}
        run: |
          SCHEDULER_STATUS=$(ssh -o StrictHostKeyChecking=no -p 2222 $SSH_USER@$SERVER_HOST \
            "cd /home/frappe/frappe-bench && bench --site dev.flamezo.in scheduler status")

          echo "Scheduler status: $SCHEDULER_STATUS"
          if echo "$SCHEDULER_STATUS" | grep -q "disabled"; then
            echo "ERROR: Scheduler is still disabled after deployment!"
            exit 1
          fi

      - name: Verify web services
        env:
          SERVER_HOST: ${{ secrets.DEV_SERVER_HOST }}
          SSH_USER: ${{ secrets.DEV_SSH_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -p 2222 $SSH_USER@$SERVER_HOST \
            "supervisorctl status frappe-bench-web:* frappe-bench-workers:* || true"
